name: Core Smoke Suite

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Assets/**
      - Packages/**
      - ProjectSettings/**
      - .github/workflows/core-smoke-suite.yml
  pull_request:
    paths:
      - Assets/**
      - Packages/**
      - ProjectSettings/**
      - .github/workflows/core-smoke-suite.yml

concurrency:
  group: core-smoke-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-smoke-suite:
    name: Run Unity Core Smoke Suite
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Unity binary
        shell: bash
        run: |
          set -euo pipefail

          UNITY_BIN="${UNITY_PATH:-}"
          if [[ -z "$UNITY_BIN" ]]; then
            UNITY_BIN="/Applications/Unity/Hub/Editor/6000.4.0f1/Unity.app/Contents/MacOS/Unity"
          fi

          if [[ ! -x "$UNITY_BIN" ]]; then
            echo "Unity executable not found or not executable at: $UNITY_BIN"
            echo "Set UNITY_PATH on the runner if Unity is installed elsewhere."
            exit 1
          fi

          echo "UNITY_BIN=$UNITY_BIN" >> "$GITHUB_ENV"

      - name: Run batch smoke suite
        shell: bash
        run: |
          set -euo pipefail

          "$UNITY_BIN" \
            -batchmode \
            -nographics \
            -quit \
            -projectPath "$GITHUB_WORKSPACE" \
            -executeMethod Elysium.Editor.SmokeBatchRunner.RunCoreSmokeSuite \
            -logFile "$GITHUB_WORKSPACE/core-smoke.log"

      - name: Validate smoke markers
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_MARKERS=(
            "[Session] PASS"
            "[Combat] PASS"
            "[LuaContextBindings] PASS"
            "[Persistence] PASS"
            "[PackagingPortability] PASS"
            "[WorldOwnership] PASS"
            "[DedicatedServer] PASS"
            "[AreaLifecycle] PASS"
            "[CharacterGallery] PASS"
            "[CharacterCreation] PASS"
            "[ExplorationSync] PASS"
            "MoonSharp path: active"
          )

          missing=0
          for marker in "${REQUIRED_MARKERS[@]}"; do
            if grep -Fq "$marker" "$GITHUB_WORKSPACE/core-smoke.log"; then
              echo "PASS marker found: $marker"
            else
              echo "Missing required marker: $marker"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Publish smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Core Smoke Summary"
            echo ""
            if [[ -f "$GITHUB_WORKSPACE/core-smoke.log" ]]; then
              echo "### Required markers"
              for marker in "[Session] PASS" "[Combat] PASS" "[LuaContextBindings] PASS" "[Persistence] PASS" "[PackagingPortability] PASS" "[WorldOwnership] PASS" "[DedicatedServer] PASS" "[AreaLifecycle] PASS" "[CharacterGallery] PASS" "[CharacterCreation] PASS" "[ExplorationSync] PASS" "MoonSharp path: active"; do
                if grep -Fq "$marker" "$GITHUB_WORKSPACE/core-smoke.log"; then
                  echo "- PASS: $marker"
                else
                  echo "- MISSING: $marker"
                fi
              done
              echo ""
              echo "### Log tail"
              echo '```text'
              tail -n 120 "$GITHUB_WORKSPACE/core-smoke.log"
              echo '```'
            else
              echo "core-smoke.log was not produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-smoke-log
          path: core-smoke.log
          if-no-files-found: error
          retention-days: 14
